<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Court Booking</title>
    <link rel="stylesheet" href="css/court.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/roket.png" alt="Rocket Icon">
            <h1>BOOK!</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about-us.html" class="active">About Us</a></li>
                <li><a href="badminton.html">Badminton</a></li>
            </ul>
        </nav>
        <div class="search">
            <img src="images/search.png" alt="Search Icon" id="search-icon">
        </div>
        <div class="auth">
            <button id="sign-in-btn">SIGN IN</button>
            <div class="profile-pic">
                <img src="images/profile.png" alt="Profile Picture">
            </div>
        </div>
    </header>

    <main>
        <section class="court">
            <h2>Court 1</h2>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- JavaScript will populate rows here -->
                </tbody>
            </table>
            <button class="book-now">BOOK NOW!</button>
        </section>
    </main>

    <footer>
        <div class="footer-info">
            <p>Roket Booking Sdn Bhd</p>
            <p>Roket Court, Batu Caves, Selangor, Malaysia</p>
            <p>Contact Us: +60 182451670</p>
        </div>
        <div class="social-section">
            <span class="follow-text">Follow Us:</span>
            <div class="social-icons">
                <a href="#"><img src="images/fb white.png" alt="Facebook"></a>
                <a href="#"><img src="images/whatsapp white.png" alt="WhatsApp"></a>
                <a href="#"><img src="images/telegram white.png" alt="Telegram"></a>
                <a href="#"><img src="images/insta.png" alt="Instagram"></a>
            </div>
        </div>
    </footer>

    <script src="js/court.js"></script>
</body>
</html>
