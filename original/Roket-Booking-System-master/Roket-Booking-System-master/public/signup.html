<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
    <div class="container">
        <div class="signup-box">
            <div class="logo">
                <img src="images/roket.png" alt="Rocket Logo" class="logo-image">
                <h1>BOOK!</h1>
            </div>
            <h2>Sign Up</h2>
            <p>Sign up to enjoy the features of Revolute.</p>
            <form id="signup-form">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" placeholder="Full Name" required>

                <label for="dob">Date of Birth</label>
                <input type="date" id="dob" name="dob" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Email" required>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Password" required>

                <button type="submit" class="btn primary-btn">Sign Up</button>

                <div class="separator">
                    <hr class="line">
                    <span class="or-text">or</span>
                    <hr class="line">
                </div>

                <button type="button" class="btn google-btn">Sign up with Google</button>
                <p>Already have an account? <a href="signin.html">Sign in</a></p>
            </form>
        </div>
        <div class="image-box">
            <img src="images/roket wall.jpeg" alt="Rocket Launch">
        </div>
    </div>
    <script src="js/signup.js"></script>
</body>
</html>
